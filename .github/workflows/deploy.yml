name: Build and deploy to Hostpoint

# Runs on every push to main, and can also be triggered manually
# from the Actions tab (Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent two deploys running at once (e.g. rapid pushes).
concurrency:
  group: hostpoint-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Uploads the freshly built ./dist/ to Hostpoint over FTPS.
      #
      # SAFETY — why this never deletes the manually-uploaded videos:
      # This action only tracks files it has itself deployed (via a
      # .ftp-deploy-sync-state.json file on the server). Files that were
      # uploaded by other means (the ~915 MB of videos in /videos and
      # /images/wim) are NOT in that state file, so they are never
      # touched or deleted. Do NOT set dangerous-clean-slate to true —
      # that would wipe the whole target folder, videos included.
      - name: Deploy to Hostpoint via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
